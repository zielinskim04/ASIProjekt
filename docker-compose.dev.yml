services:
  db:
    container_name: asi_db_dev
    ports:
      - "5432:5432"
    restart: unless-stopped

  data_downloader:
    container_name: asi_downloader_dev
    build:
      dockerfile: Dockerfile.dev
    volumes:
      - ./data_downloader:/app
    depends_on:
      - db
    dns:
      - 8.8.8.8
      - 1.1.1.1

  backend:
    container_name: asi_backend_dev
    build:
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # allows to edit backend code on host and see changes live without rebuilding the image
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    dns:
      - 8.8.8.8
      - 1.1.1.1

  frontend:
    image: node:20-alpine
    container_name: asi_frontend_dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules  # anonymous vol prevents host overwrite
    command: sh -c "npm install && npm start"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - PORT=3000

volumes:
  frontend_node_modules: