version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: asi_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=realestate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: asi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://admin:admin@db:5432/realestate

  frontend:
    image: node:20-alpine
    container_name: asi_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "if [ ! -f package.json ]; then npx create-react-app . ; fi && npm start"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data: